<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1080" height="720" fill="#f8fafc"/>
  <style>
    text { font-family: PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #f8fafc; }
    .h1 { font-size: 15px; font-weight: 700; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 12px; fill: #334155; }
    .muted { font-size: 11px; fill: #64748b; }
  </style>

  <rect x="24" y="20" width="1032" height="52" rx="12" fill="#0f172a" filter="url(#shadow)"/>
  <text x="540" y="53" text-anchor="middle" class="title">CNNMLP vs ACT · ALOHA 基线 vs 主策略</text>

  <rect x="40" y="92" width="480" height="580" rx="16" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
  <rect x="40" y="92" width="480" height="48" rx="16" fill="#dcfce7"/>
  <rect x="40" y="124" width="480" height="16" fill="#dcfce7"/>
  <text x="280" y="124" text-anchor="middle" fill="#166534" font-size="20" font-weight="700">CNNMLP (baseline)</text>

  <text x="70" y="168" class="body" font-weight="700">核心思路 Core idea</text>
  <text x="70" y="192" class="body">ResNet 提特征 + MLP 回归下一步关节角</text>
  <text x="70" y="232" class="body" font-weight="700">视觉 backbone</text>
  <text x="70" y="256" class="body">每相机独立 ResNet18（权重不共享）</text>
  <text x="70" y="296" class="body" font-weight="700">时序建模</text>
  <text x="70" y="320" class="body">无 · 马尔可夫：只看当前帧</text>
  <text x="70" y="360" class="body" font-weight="700">输出</text>
  <text x="70" y="384" class="body">单步 a_hat ∈ R^14</text>
  <text x="70" y="424" class="body" font-weight="700">训练标签</text>
  <text x="70" y="448" class="body">actions[:, 0]（demo 的下一步）</text>
  <text x="70" y="488" class="body" font-weight="700">损失</text>
  <text x="70" y="512" class="body">MSE(a_hat, a)</text>
  <text x="70" y="552" class="body" font-weight="700">推理频率</text>
  <text x="70" y="576" class="body">每个 control step 都 query</text>
  <text x="70" y="616" class="body" font-weight="700">随机性</text>
  <text x="70" y="640" class="body">无 CVAE · 硬映射</text>

  <rect x="560" y="92" width="480" height="580" rx="16" fill="#ffffff" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
  <rect x="560" y="92" width="480" height="48" rx="16" fill="#e0e7ff"/>
  <rect x="560" y="124" width="480" height="16" fill="#e0e7ff"/>
  <text x="800" y="124" text-anchor="middle" fill="#3730a3" font-size="20" font-weight="700">ACT (DETRVAE)</text>

  <text x="590" y="168" class="body" font-weight="700">核心思路 Core idea</text>
  <text x="590" y="192" class="body">CVAE + Transformer 预测 action chunk</text>
  <text x="590" y="232" class="body" font-weight="700">视觉 backbone</text>
  <text x="590" y="256" class="body">共享 ResNet18 + cross-attention 融合</text>
  <text x="590" y="296" class="body" font-weight="700">时序建模</text>
  <text x="590" y="320" class="body">100 步 chunk · 100 个 learned queries</text>
  <text x="590" y="360" class="body" font-weight="700">输出</text>
  <text x="590" y="384" class="body">100 步 a_hat ∈ R^(100 x 14)</text>
  <text x="590" y="424" class="body" font-weight="700">训练标签</text>
  <text x="590" y="448" class="body">完整 future 100 步 + padding mask</text>
  <text x="590" y="488" class="body" font-weight="700">损失</text>
  <text x="590" y="512" class="body">L1 + beta*KL(q(z|a) || N(0,I))</text>
  <text x="590" y="552" class="body" font-weight="700">推理频率</text>
  <text x="590" y="576" class="body">每 100 steps query 一次，逐步执行 chunk</text>
  <text x="590" y="616" class="body" font-weight="700">随机性</text>
  <text x="590" y="640" class="body">CVAE 隐变量 z；推理时 z=0</text>

  <circle cx="540" cy="380" r="36" fill="#0f172a"/>
  <text x="540" y="388" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">VS</text>

  <rect x="40" y="690" width="1000" height="20" rx="6" fill="#e2e8f0"/>
  <text x="540" y="704" text-anchor="middle" class="muted">Shared input: multi-cam RGB + qpos(14) | Task: behavior cloning | Entry: imitate_episodes.py -&gt; policy.py</text>

</svg>
