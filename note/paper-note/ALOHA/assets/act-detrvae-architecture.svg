<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1100" height="980" fill="#f8fafc"/>
  <style>
    text { font-family: PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #f8fafc; }
    .h1 { font-size: 15px; font-weight: 700; }
    .h2 { font-size: 14px; font-weight: 600; }
    .body { font-size: 12px; fill: #334155; }
    .muted { font-size: 11px; fill: #64748b; }
  </style>

  <rect x="24" y="20" width="1052" height="56" rx="12" fill="#4338ca" filter="url(#shadow)"/>
  <text x="550" y="55" text-anchor="middle" class="title">ACTPolicy / DETRVAE · 训练 vs 推理</text>

  <rect x="40" y="96" width="1020" height="250" rx="14" fill="#faf5ff" stroke="#a855f7" stroke-width="2" stroke-dasharray="8 4" filter="url(#shadow)"/>
  <text x="68" y="124" fill="#6b21a8" font-size="15" font-weight="700">CVAE Encoder · 仅训练时运行</text>
  <text x="920" y="124" text-anchor="end" fill="#9333ea" font-size="12" font-weight="600">推理时跳过 → z = 0</text>
  <rect x="70" y="142" width="180" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="170" text-anchor="middle" class="body" font-weight="700">actions</text>
  <text x="160" y="190" text-anchor="middle" class="body" font-weight="400">(B, 100, 14)</text>
  <rect x="280" y="142" width="140" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="170" text-anchor="middle" class="body" font-weight="700">qpos</text>
  <text x="350" y="190" text-anchor="middle" class="body" font-weight="400">(B, 14)</text>
  <rect x="450" y="142" width="120" height="56" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="170" text-anchor="middle" class="body" font-weight="700">[CLS]</text>
  <rect x="600" y="132" width="420" height="76" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="810" y="160" text-anchor="middle" class="body" font-weight="700">concat -&gt; Transformer Encoder (4 layers)</text>
  <text x="810" y="180" text-anchor="middle" class="body" font-weight="400">+ sinusoid pos, mask padding</text>
  <text x="810" y="200" text-anchor="middle" class="body" font-weight="400">take CLS output -&gt; latent_proj</text>
  <line x1="250" y1="170" x2="280" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="170" x2="450" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="170" x2="600" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="230" width="500" height="96" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="258" text-anchor="middle" class="body" font-weight="700">重参数化 reparametrize(μ, logσ²)</text>
  <text x="550" y="278" text-anchor="middle" class="body" font-weight="400">μ, logvar: (B, 32) → latent_out_proj</text>
  <text x="550" y="298" text-anchor="middle" class="body" font-weight="400">推理: z = zeros(32)</text>
  <text x="550" y="318" text-anchor="middle" class="body" font-weight="400">KL = β · KL(q(z|a) || N(0,I))</text>
  <rect x="860" y="248" width="160" height="60" rx="10" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="276" text-anchor="middle" class="body" font-weight="700">latent z</text>
  <text x="940" y="296" text-anchor="middle" class="body" font-weight="400">32-d embedding</text>
  <line x1="810" y1="208" x2="550" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="278" x2="860" y2="278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="370" width="1020" height="420" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="68" y="398" fill="#0369a1" font-size="15" font-weight="700">Transformer Decoder · 训练 &amp; 推理共用</text>
  <rect x="70" y="418" width="300" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="220" y="446" text-anchor="middle" class="body" font-weight="700">image (B, C, 3, H, W)</text>
  <text x="220" y="466" text-anchor="middle" class="body" font-weight="400">ImageNet Normalize, C=2</text>
  <rect x="70" y="508" width="300" height="64" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="536" text-anchor="middle" class="body" font-weight="700">共享 ResNet18 backbone</text>
  <text x="220" y="556" text-anchor="middle" class="body" font-weight="400">backbones[0] 处理所有相机</text>
  <text x="220" y="576" text-anchor="middle" class="body" font-weight="400">→ input_proj Conv1x1</text>
  <rect x="70" y="588" width="300" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="616" text-anchor="middle" class="body" font-weight="700">concat 相机特征（width 维拼接）</text>
  <line x1="220" y1="490" x2="220" y2="508" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="572" x2="220" y2="588" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="418" width="180" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="446" text-anchor="middle" class="body" font-weight="700">qpos (B, 14)</text>
  <text x="510" y="466" text-anchor="middle" class="body" font-weight="400">input_proj_robot_state</text>
  <rect x="420" y="492" width="180" height="56" rx="8" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="520" text-anchor="middle" class="body" font-weight="700">latent z</text>
  <text x="510" y="540" text-anchor="middle" class="body" font-weight="400">+ additional_pos_embed</text>
  <line x1="940" y1="308" x2="940" y2="340" stroke="#7c3aed" stroke-width="2"/>
  <line x1="940" y1="340" x2="510" y2="340" stroke="#7c3aed" stroke-width="2"/>
  <line x1="510" y1="340" x2="510" y2="492" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="418" width="390" height="218" rx="10" fill="#eff6ff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="446" text-anchor="middle" class="body" font-weight="700">Transformer Decoder</text>
  <text x="835" y="466" text-anchor="middle" class="body" font-weight="400">cross-attn: 100 queries x vision memory</text>
  <text x="835" y="486" text-anchor="middle" class="body" font-weight="400">+ proprio (qpos) + latent token</text>
  <text x="835" y="506" text-anchor="middle" class="body" font-weight="400">query_embed: Embedding(100, hidden_dim)</text>
  <text x="835" y="526" text-anchor="middle" class="body" font-weight="400">hidden_dim=512, nheads=8, 7 dec layers</text>
  <text x="835" y="546" text-anchor="middle" class="body" font-weight="400">detr_vae.py DETRVAE.transformer</text>
  <line x1="370" y1="612" x2="640" y2="560" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="474" x2="640" y2="500" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="548" x2="640" y2="540" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="660" y="580" width="350" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="835" y="608" text-anchor="middle" class="body" font-weight="400">100 action queries -&gt; 100 future steps (chunk)</text>
  <rect x="640" y="660" width="390" height="100" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="688" text-anchor="middle" class="body" font-weight="700">Output Heads</text>
  <text x="835" y="708" text-anchor="middle" class="body" font-weight="400">action_head: Linear(hidden, 14) -&gt; (B, 100, 14)</text>
  <text x="835" y="728" text-anchor="middle" class="body" font-weight="400">is_pad_head: Linear(hidden, 1)</text>
  <text x="835" y="748" text-anchor="middle" class="body" font-weight="400">train loss = L1 + beta*KL</text>
  <line x1="835" y1="636" x2="835" y2="660" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="660" width="520" height="100" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="688" text-anchor="middle" class="body" font-weight="700">部署执行 eval_bc</text>
  <text x="330" y="708" text-anchor="middle" class="body" font-weight="400">每 100 env steps query 一次 policy</text>
  <text x="330" y="728" text-anchor="middle" class="body" font-weight="400">逐步执行 chunk[0], chunk[1], ...</text>
  <text x="330" y="748" text-anchor="middle" class="body" font-weight="400">可选 temporal aggregation</text>
  <text x="330" y="768" text-anchor="middle" class="body" font-weight="400">CNNMLP: 每步 query，只输出 1 步</text>

  <rect x="40" y="810" width="1020" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="68" y="838" fill="#0f172a" font-size="14" font-weight="700">图例 · policy.py 分叉</text>
  <rect x="70" y="854" width="14" height="14" fill="#dbeafe" stroke="#2563eb"/>
  <text x="92" y="866" class="body">输入 tensor</text>
  <rect x="200" y="854" width="14" height="14" fill="#faf5ff" stroke="#a855f7" stroke-dasharray="4 2"/>
  <text x="222" y="866" class="body">仅训练</text>
  <rect x="320" y="854" width="14" height="14" fill="#eff6ff" stroke="#0284c7"/>
  <text x="342" y="866" class="body">训练+推理</text>
  <rect x="480" y="854" width="14" height="14" fill="#fee2e2" stroke="#ef4444"/>
  <text x="502" y="866" class="body">输出 / loss</text>
  <text x="70" y="896" class="body">训练: policy(qpos, image, actions, is_pad) -&gt; {l1, kl, loss}</text>
  <text x="70" y="918" class="body">推理: policy(qpos, image) -&gt; a_hat (B,100,14); Encoder 关闭; z=0</text>
  <text x="70" y="940" class="muted">源码: code/act/policy.py, code/act/detr/models/detr_vae.py</text>

</svg>
